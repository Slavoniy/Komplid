name: Deploy to Timeweb

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}     # IP сервера, созданного Terraform (из outputs.tf)
          username: ${{ secrets.SERVER_USER }} # Обычно 'root' или 'ubuntu'
          key: ${{ secrets.SERVER_SSH_KEY }}   # Приватный SSH ключ
          script: |
            cd /opt/constructiondocs || (mkdir -p /opt/constructiondocs && cd /opt/constructiondocs)

            # Клонируем или обновляем репозиторий
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git pull origin main
            fi

            # Перезапускаем Docker Compose
            docker compose down
            docker compose up -d --build

            # Применяем миграции базы данных
            docker compose exec -T backend alembic upgrade head
