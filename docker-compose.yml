
services:
  db:
    image: postgres:15-alpine
    container_name: constructiondocs_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: constructiondocs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: constructiondocs_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/constructiondocs
      - MOCK_SERVICES_URL=http://mock_services:8001
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: constructiondocs_frontend
    ports:
      - "5173:5173"
    environment:
      # Прокидываем урл бэкенда для vite
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  mock_services:
    build:
      context: ./mock_services
      dockerfile: Dockerfile
    container_name: constructiondocs_mocks
    ports:
      - "8001:8001"
    volumes:
      - ./mock_services:/app

volumes:
  pgdata: