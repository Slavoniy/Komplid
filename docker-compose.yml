
services:
  db:
    image: postgres:15-alpine
    container_name: constructiondocs_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: constructiondocs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: constructiondocs_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/constructiondocs
      - MOCK_SERVICES_URL=http://mock_services:8001
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: constructiondocs_frontend
    ports:
      - "5173:5173"
    environment:
      # Прокидываем урл бэкенда для vite
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  mock_services:
    build:
      context: ./mock_services
      dockerfile: Dockerfile
    container_name: constructiondocs_mocks
    ports:
      - "8001:8001"
    volumes:
      - ./mock_services:/app

  minio:
    image: minio/minio:latest
    container_name: constructiondocs_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  createbuckets:
    image: minio/mc
    container_name: constructiondocs_mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin123;
      /usr/bin/mc mb -p myminio/constructiondocs-files;
      /usr/bin/mc anonymous set download myminio/constructiondocs-files;
      exit 0;
      "

volumes:
  pgdata:
  minio_data: